<html>

<head>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="top">
        <h1 class="heading">Metric/Imperial Unit Conversion</h1>
        <input type="text" id="userInput">
        <button onclick="unitConversion()">Convert</button>
    </div>

    <div class="container">

        <div class="bottom">
            <h3>Length (Meter/Feet)</h3>
            <p>0 meters = 0 feet</p>
        </div>

        <div class="bottom">
            <h3>Volume (Liters/Gallons)</h3>
            <p>0 liters = 0 gallons</p>
        </div>

        <div class="bottom">
            <h3>Mass (Kilograms/Pounds)</h3>
            <p>0 kg = 0 pounds</p>
        </div>

    </div>
        <script src="index.js"></script>
</body>

</html>
